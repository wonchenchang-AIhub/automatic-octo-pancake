<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 提示詞模組知識庫</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0 0 1rem 0;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 大分類導覽列設計 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .tab-btn {
            background-color: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .tab-btn:hover, .tab-btn.active {
            background-color: white;
            color: var(--primary-color);
            font-weight: bold;
        }

        /* 內容區塊 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        /* 提示詞卡片設計 */
        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .card .desc {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .prompt-box {
            background-color: #f8f9fa;
            border-left: 4px solid var(--accent-color);
            padding: 10px;
            font-size: 0.85rem;
            color: #444;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .copy-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            text-align: center;
        }

        .copy-btn:hover {
            background-color: #2980b9;
        }

        /* 提示訊息 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>🤖 專業 AI 提示詞模組知識庫</h1>
        <div class="tabs" id="tabs-container">
            </div>
    </header>

    <div class="container">
        <h2 id="category-title" style="color: var(--primary-color); border-left: 5px solid var(--accent-color); padding-left: 10px;">請選擇上方的分類</h2>
        <div class="module-grid" id="module-container">
            </div>
    </div>

    <div class="toast" id="toast">✅ 提示詞已複製到剪貼簿！</div>

    <script>
        // 將四個檔案中的精華提示詞整理為結構化資料
        const database = {
            "AI工具神組合": [
                {
                    title: "產業資訊全貌分析",
                    desc: "Gems 客製化大腦 + NotebookLM。要求 AI 扮演資訊結構化專家，從宏觀到微觀萃取海量資訊的本質。",
                    prompt: "【角色定位】\n你是一位專精於**資訊結構化（Information Structuring）**的專家...\n【核心任務】\n請分析用戶提供的原始素材，產出一個能讓人「一發掌握重點」的專業輸出...\n【輸出格式】\n請務必包含：【結論摘要】、【要點一覽】、【結構化地圖】。"
                },
                {
                    title: "Gemini Deep Research 變現分析",
                    desc: "尋找真實可靠的線上變現機會，要求強制溯源與真實數據的查核模式。",
                    prompt: "# Role: 嚴謹的數位商業分析師與事實查核員\n## Core Task\n分析 10 種主流線上變現模式，並提供 3-5 個普通人使用 AI 工具變現的真實案例。\n## Critical Constraints\n1. 拒絕編造。2. 強制溯源。3. 網址打包。"
                }
            ],
            "研究/評估/企劃套路": [
                {
                    title: "頂級分析師分析套路",
                    desc: "扮演頂尖策略顧問（如 McKinsey / BCG），進行 13 種套路解析並找出隱藏訊號。",
                    prompt: "【角色】你是一位具有國際一流顧問公司等級分析能力的資深產業分析師...\n【任務】請針對指定產業資料進行分析。請不要只摘要資訊，而是找出最值得注意的洞察。\n思考順序：1.第一性原理 2.訊號偵測 3.結構變化 4.產業權力轉移..."
                },
                {
                    title: "呼喚假伯斯 (深度靈魂拷問)",
                    desc: "極致簡約且帶有毒舌屬性，用現實扭曲力場幫你解決職場問題。",
                    prompt: "你現在是 Steve Jobs。你的核心性格：極致簡約，厭惡複雜與冗長。直率且毒舌，對平庸的提案沒有耐心... 你的任務目標是：利用你的專業能力，幫我解決我遇到的職場問題。"
                },
                {
                    title: "萬用校稿總編輯",
                    desc: "擁有二十年經驗的繁體中文總編輯，對文本進行基礎糾錯、句構優化與詞彙精煉。",
                    prompt: "你是一位擁有超過二十年經驗的資深繁體中文總編輯... 核心任務：接收使用者提供的繁體中文文本，進行：1. 基礎錯誤校正 2. 句構優化 3. 詞彙精煉。並以表格方式呈現修改前後對照。"
                },
                {
                    title: "McKinsey顧問型一頁式總結",
                    desc: "提萃資訊濃縮在一頁供決策的高密度顧問簡報投影片輸出框架。",
                    prompt: "請你扮演一位頂尖策略顧問公司的資深合夥人。針對分析主題進行商業分析，並以單張高密度顧問簡報投影片（HTML 格式）輸出。包含：Executive Summary、對照表、策略框架等。"
                }
            ],
            "個人化預設提示詞": [
                {
                    title: "提示詞優化與結構轉化",
                    desc: "將口語化提示詞轉化為高階的 [角色/背景/指令/約束] 結構。",
                    prompt: "第一步：專家優化。當我輸入「原始提示詞」時，先將其轉化為更精確的「結構化提示詞」。轉化時必須包含：[角色任務]、[背景資訊]、[具體指令]、[約束條件]。\n第二步：內部評分，制定標準直到答案達 10/10 完美版本才輸出。"
                },
                {
                    title: "嚴格內部事實查核",
                    desc: "防堵幻覺，強制 AI 進行證據優先與數據比對的自我審查機制。",
                    prompt: "在回答問題之前，我會先執行「內部事實查核」程序：\n【證據優先】：僅依據確切已知的事實回答。\n【允許留白】：信心水準低於 90% 時輸出資料不足。\n【來源標註】：拒絕編造，列出文獻庫。\n【數據比對】：確保報告中英數字一致。"
                }
            ],
            "圖片與簡報生成模組": [
                {
                    title: "品牌封面/IG首頁視覺",
                    desc: "極簡封面設計，適合社群媒體發文或電子報頭圖使用。",
                    prompt: "主題：以（品牌主題）為靈感的極簡封面設計，背景為柔和漸層色。\n風格詞：minimalist design, pastel gradient background, clean composition, editorial cover style\n不要：文字、人物、複雜紋理"
                },
                {
                    title: "簡報設計專家框架",
                    desc: "快速建立一份符合邏輯且視覺清爽的美觀 PPT 架構。",
                    prompt: "請扮演一位頂尖簡報設計專家。為 [主題] 設計一份完整簡報架構：\n1. 分析目標受眾\n2. 提供 10-15 張投影片詳細大綱\n3. 包含開場鉤子、故事架構、關鍵數據呈現與結尾行動呼籲。"
                },
                {
                    title: "創作者日常情境圖",
                    desc: "用於個人故事、生活日常貼文，營造溫暖療癒氛圍。",
                    prompt: "主題：一位創作者坐在咖啡店窗邊，用筆電工作，桌上有筆記本與咖啡杯，陽光灑入。\n風格詞：cozy morning light, realistic photo, cinematic atmosphere, storytelling mood\n不要：誇張濾鏡、過飽和色"
                }
            ]
        };

        const tabsContainer = document.getElementById('tabs-container');
        const moduleContainer = document.getElementById('module-container');
        const categoryTitle = document.getElementById('category-title');
        const toast = document.getElementById('toast');

        // 初始化導覽列
        function initTabs() {
            const categories = Object.keys(database);
            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderModules(cat);
                };
                tabsContainer.appendChild(btn);
            });
            // 預設載入第一個分類
            renderModules(categories[0]);
        }

        // 渲染對應分類的卡片
        function renderModules(category) {
            categoryTitle.textContent = `📌 ${category}`;
            moduleContainer.innerHTML = '';
            
            const modules = database[category];
            modules.forEach(mod => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${mod.title}</h3>
                    <div class="desc">${mod.desc}</div>
                    <div class="prompt-box" id="prompt-${mod.title}">${mod.prompt}</div>
                    <button class="copy-btn" onclick="copyToClipboard('${mod.prompt}')">📋 一鍵複製提示詞</button>
                `;
                moduleContainer.appendChild(card);
            });
        }

        // 複製到剪貼簿功能
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.style.opacity = 1;
                setTimeout(() => {
                    toast.style.opacity = 0;
                }, 2000);
            });
        }

        // 網頁載入時啟動
        window.onload = initTabs;
    </script>
</body>
</html>
